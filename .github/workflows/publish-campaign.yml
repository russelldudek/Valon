name: Publish complete Valon candidate campaign

on:
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: valon-campaign-publication
  cancel-in-progress: false

jobs:
  publish:
    if: github.event_name != 'issues' || github.event.issue.title == 'Publish complete Valon candidate campaign'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify and expand campaign package
        shell: bash
        run: |
          set -euo pipefail
          cat campaign-package/chunk-* > /tmp/valon-campaign.b64
          base64 --decode /tmp/valon-campaign.b64 > /tmp/valon-campaign.tar.gz
          echo "fb180f6202d4775c41a073b36a41c8ca3debb8e4b474786841179bb5495eddc3  /tmp/valon-campaign.tar.gz" | sha256sum --check
          tar -xzf /tmp/valon-campaign.tar.gz -C .

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate and validate campaign PDFs
        run: |
          python -m pip install --disable-pip-version-check reportlab pypdf
          python make_pdfs.py
          python make_compact_pdfs.py
          python - <<'PY'
          from pypdf import PdfReader
          expected = {
              'docs/Russell-Dudek-Valon-Resume.pdf': 2,
              'docs/Russell-Dudek-Valon-Cover-Letter.pdf': 1,
              'docs/Russell-Dudek-Valon-Interview-Brief.pdf': 1,
              'docs/Russell-Dudek-Valon-90-Day-Plan.pdf': 1,
              'docs/Russell-Dudek-Valon-Field-Build-Brief.pdf': 1,
          }
          for path, pages in expected.items():
              actual = len(PdfReader(path).pages)
              assert actual == pages, f'{path}: expected {pages}, got {actual}'
          PY

      - name: Replace staging with complete campaign on main
        shell: bash
        run: |
          set -euo pipefail
          rm -rf campaign-package
          rm -f .publication-trigger
          rm -f .github/workflows/publish-campaign.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish complete Valon candidate campaign"
          git push origin HEAD:main

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
